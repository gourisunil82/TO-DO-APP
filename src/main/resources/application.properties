spring.application.name=TO-DO-APP
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root10

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Configuration
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Security (to disable the default login page)
spring.security.user.password=disabled
# Enable bean overriding
spring.main.allow-bean-definition-overriding=true