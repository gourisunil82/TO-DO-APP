<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-check-circle-fill text-primary me-2"></i>Todo App
            </a>
            
            <div class="navbar-nav ms-auto align-items-center">
                <span class="navbar-text me-3 d-none d-sm-block">
                    <i class="bi bi-person-circle me-1"></i>
                    Welcome, <span class="fw-semibold" th:text="${session.user.username}"></span>!
                </span>
                <a class="btn btn-outline-danger btn-sm" href="/logout">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stats-card primary slide-in">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-list-task display-4 mb-3"></i>
                        <h3 class="card-title" th:text="${totalTasks}">0</h3>
                        <p class="card-text mb-0">Total Tasks</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card success slide-in" style="animation-delay: 0.1s;">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-check-circle display-4 mb-3"></i>
                        <h3 class="card-title" th:text="${completedTasks}">0</h3>
                        <p class="card-text mb-0">Completed</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card warning slide-in" style="animation-delay: 0.2s;">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-clock display-4 mb-3"></i>
                        <h3 class="card-title" th:text="${totalTasks - completedTasks}">0</h3>
                        <p class="card-text mb-0">Pending</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Task Form -->
        <div class="card mb-4 slide-in" style="animation-delay: 0.3s;">
            <div class="card-header bg-transparent border-0 pb-0">
                <h5 class="card-title mb-0">
                    <i class="bi bi-plus-circle me-2 text-primary"></i>Add New Task
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/tasks}" method="post">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="title" 
                                   placeholder="What needs to be done?" required>
                        </div>
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="description" 
                                   placeholder="Add a description (optional)">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="bi bi-plus-lg me-1"></i>Add
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="card slide-in" style="animation-delay: 0.4s;">
            <div class="card-header bg-transparent border-0 pb-0">
                <h5 class="card-title mb-0">
                    <i class="bi bi-list-check me-2 text-primary"></i>Your Tasks
                    <span class="badge bg-primary ms-2" th:text="${totalTasks}">0</span>
                </h5>
            </div>
            <div class="card-body">
                <!-- Empty State -->
                <div th:if="${tasks.empty}" class="empty-state">
                    <i class="bi bi-clipboard-x"></i>
                    <h4 class="text-muted">No tasks yet</h4>
                    <p class="text-muted">Add your first task using the form above!</p>
                </div>
                
                <!-- Tasks -->
                <div th:each="task : ${tasks}" class="task-item card mb-3 fade-in" 
                     th:classappend="${task.completed} ? 'completed' : ''">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-auto">
                                <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" class="d-inline">
                                    <input type="checkbox" th:checked="${task.completed}" 
                                           onchange="this.form.submit()" class="form-check-input"
                                           th:id="'task-' + ${task.id}">
                                </form>
                            </div>
                            <div class="col">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="flex-grow-1">
                                        <h6 class="task-title mb-1" th:text="${task.title}">Task Title</h6>
                                        <p class="task-description mb-1" th:text="${task.description}">Task Description</p>
                                        <small class="task-meta">
                                            <i class="bi bi-clock me-1"></i>
                                            Created: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy HH:mm')}"></span>
                                        </small>
                                    </div>
                                    <div class="btn-group ms-3">
                                        <a th:href="@{/tasks/{id}/edit(id=${task.id})}" 
                                           class="btn btn-outline-primary btn-sm">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" 
                                                    onclick="return confirm('Are you sure you want to delete this task?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 text-white-50 mt-5">
        <div class="container">
            <p>&copy; 2024 Todo App. Organize your life, one task at a time.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
   
  
</body>
</html>
